<!--
Обязательное задание.

Необходимо вывести в консоль значения выражений:
10 + 10 + "10"
10 + "10" + 10
10 + 10 + +"10"
10 / -""
10 / +"2,5"
В этих выражениях нет опечаток, вам их нужно скопировать и вывести в консоль.

Над каждым выводом в консоль необходимо объяснить почему мы получаем такой
результат.

Объяснения пишите в таком формате:
/*
1. 4 умножаем на 2 получаем 8.
2. 3 минус 8 получаем -5.
3. С помощью console.log выводим число -5 в консоль.
*/
console.log(3 - 4 * 2);
-->
<script>
  "use strict";

  /*
  1. 10 + 10 = 20 суммируются числа
  2. 20 + "10" = 2010 конкатенация
  */
  console.log(10 + 10 + "10"); //2010

 /*
 1. 10 + "10" = "1010" конкатенация
 2. "1010" + 10 = 101010 конкатенация
 */
  console.log(10 + "10" + 10); // 101010

  /*
  1. 10 +10 = 20 числа суммируются
  2. 20 + +"10" = 30 унарный оператор +"10" преобразующий строку в число
  */
  console.log(10 +10 + +"10"); //30

  /*
  1. 10 / -"" получим безконечность с отрицательным знаком так как -"" пустая 
    строка с унарный оператор будет заменена на -0
  2. 10 / -0 получаем -Infinity

  */
  console.log(10 / -""); // -Infinity

  /*
  1. 10 / +"2,5" унарный оператор перед текстом должен преобразовать строку в 
    число но так как у нас стоит запятая в дробном числе, а не точка,
    то JS не выполнит данное действие и мы получим NaN.
  2. 10 / NaN при делении числа на строку полуаем NaN
  */
  console.log(10 / +"2,5"); //NaN


</script>
</body>
